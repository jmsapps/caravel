name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: python -m pip install ".[test]"
      - name: Test
        run: python -m pytest -q
      - name: Lint
        run: python -m ruff check src tests examples
      - name: Format
        run: python -m ruff format --check src tests examples
      - name: Type check
        run: python -m mypy src/caravel

  minimum-fsspec:
    name: Minimum fsspec
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install minimum supported fsspec
        run: python -m pip install ".[test]" "fsspec==2024.6.0"
      - name: Test
        run: python -m pytest -q
